<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="demo.css">
    <style>
        h1{
            color: goldenrod;
        }
        .title{
            color:brown;
            color: green;
            background: yellow;
            width:30%;
            height: 700px;
            padding: 10px 20px 30px 40px;
            padding: 10px 20px 30px;
            padding: 10px 20px;
            border:10px outset blue;
            border-radius: 20px;
            margin:20px;
            margin:20px 10px;
            margin:20px 10px 30px;
            margin:20px 10px 30px 40px;
            display: inline-block;
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQmd1XVc04LILHrhf5aTFpnEjhu5pL6pkw_W_4_51dZkWdb2bUsd7KVttEYqnneNEnb45voWOPg0vScN20N6s-9_EePkjgkc2c1Wm7x6lk&s=10);
            background-repeat: no-repeat;
            background-size: cover;
            background-size: contain;
            background-size: 100% 100%;
            text-align: center;

        }
        #el1{
            color: blue;

        }
        div{
            background:lightblue;
            width: 75%;
            padding:30px;
            height: 200px;
            margin: 20px;
        }
        span{
            background: red;
            /*
            For Inline Elements width,height and margin ,height top and bottom are not applied
            display:inline-block;--- it will behave like a inline but
            take properties like block level
            */
            width: 500px;
            height: 100px;
            margin: 20px;

        }
    </style>
</head>
<body>
    <div>Block Level<span>Element </span></div>
    <h1 class="title">Inline Content</h1>
    <h1 class="title">Inline Content</h1>
    <h1 class="title">Inline Content</h1>
    <h1 class="title">Inline Content</h1>
    <h1 class="title" id="el1">Inline Content</h1>
    <h1 class="title">Inline Content</h1>
    <h1 class="title">Inline Content</h1>
</body>
</html>
