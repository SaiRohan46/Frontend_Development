<body>
    <!-- 
    display behaviour 

    Block Level Elements
    -- Block level elements are the elements which occupies total space and always start on a new line
    -- Heading,Paragraph,List,Table,Form

    Inline Line Elements
    -- Inline elements are the elements which occupies necessary space and doesnt start on a new line
    -- Span,anchor tag,img tag,input

    div and span
    -- Division elements which is used to group th<e sections for applying styles
    <div>

    </div>

    Span
    -- Span is used to group the text for applying styles

    semantics
    -- Semantics are used to convey the meaning about the content to the browser and the developer
    <header>content</header>
    nav
    section
    aside
    article
    footer

    forms
    -- these are used to collect the data from the user and allows the users to submit the data to the server
    -- forms are defined with form tags
    1) type
    -- it controls formified behaviour
    type="text"


    4) Name
    -- It will carry the data 
    5) Value
    -- It predefined Value



    application
    
    <h1>Text1</h1> <h2>text2</h2>
    <a href="">Link1</a>
    <a href="">Link2</a> 
-->

        <br>

        <button type="submit">Submit</button>
